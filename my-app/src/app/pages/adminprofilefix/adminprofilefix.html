<div class="admin-page-root">

<aside class="admin-sidebar">
  <div class="admin-sidebar-header">
    <div class="admin-logo">
      <div class="admin-logo-icon"><i class="ri-store-2-fill"></i></div>
      <span class="admin-logo-text">Trang quản trị</span>
    </div>
  </div>
  <nav class="admin-nav-menu">
    <a class="admin-nav-item" routerLink="/admin" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
      <i class="ri-dashboard-line"></i><span>Dashboard</span>
    </a>
    <a class="admin-nav-item" routerLink="/admin/users" routerLinkActive="active">
      <i class="ri-team-line"></i><span>Quản lý Users</span>
    </a>
    <a class="admin-nav-item" routerLink="/admin/products" routerLinkActive="active">
      <i class="ri-shopping-bag-line"></i><span>Sản phẩm</span>
    </a>
    <a class="admin-nav-item" routerLink="/admin/blogs" routerLinkActive="active">
      <i class="ri-article-line"></i><span>Blogs</span>
    </a>
    <a class="admin-nav-item" routerLink="/admin/orders" routerLinkActive="active">
      <i class="ri-shopping-cart-line"></i><span>Đơn hàng</span>
    </a>
    <div class="admin-nav-divider"></div>
    <button class="admin-nav-item" (click)="onLogout()">
      <i class="ri-logout-box-line"></i><span>Đăng xuất</span>
    </button>
  </nav>
</aside>

<section class="admin-wrap">
  <main class="admin-main">

    <!-- Header -->
    <div class="admin-header">
      <h1>
        <i class="ri-user-settings-line"></i>
        {{ userId === 'new' ? 'Thêm User mới' : 'Chỉnh sửa User' }}
      </h1>
      <div class="admin-header-actions">
        <button class="admin-action-btn" (click)="goBack()">
          <i class="ri-arrow-left-line"></i> Quay lại
        </button>
      </div>
    </div>

    <!-- Loading -->
    <div *ngIf="isLoading" class="admin-empty-state">
      <i class="ri-loader-4-line spin" style="font-size:28px;margin-bottom:12px"></i>
      Đang tải...
    </div>

    <ng-container *ngIf="!isLoading && form">
      <div class="user-grid">

        <!-- Col trái: Thông tin -->
        <div class="user-col-left">

          <!-- Card: Thông tin cơ bản -->
          <div class="detail-card">
            <h2 class="card-title"><i class="ri-id-card-line"></i> Thông tin tài khoản</h2>
            <div class="card-body">
              <div class="form-grid">

                <div class="form-group" *ngIf="userId !== 'new'">
                  <label>User ID</label>
                  <input type="text" [ngModel]="form.UserId" [readonly]="true">
                </div>

                <div class="form-group">
                  <label>Email <span style="color:#dc2626">*</span></label>
                  <input type="email" [(ngModel)]="form.email"
                         placeholder="user@email.com"
                         [readonly]="userId !== 'new'">
                  <small *ngIf="userId !== 'new'">Email không thể thay đổi sau khi tạo</small>
                </div>

                <div class="form-group">
                  <label>Họ tên</label>
                  <input type="text" [(ngModel)]="form.fullname" placeholder="Nguyễn Văn A">
                </div>

                <div class="form-group">
                  <label>Role</label>
                  <select [(ngModel)]="form.role">
                    <option value="customer">customer</option>
                    <option value="admin">admin</option>
                  </select>
                </div>

                <div class="form-group">
                  <label>Provider</label>
                  <select [(ngModel)]="form.provider">
                    <option value="email">email</option>
                    <option value="google">google</option>
                    <option value="facebook">facebook</option>
                    <option value="instagram">instagram</option>
                  </select>
                </div>

              </div>
            </div>
          </div>

          <!-- Card: Avatar -->
          <div class="detail-card">
            <h2 class="card-title"><i class="ri-image-add-line"></i> Ảnh đại diện</h2>
            <div class="avatar-preview">
              <img *ngIf="form.avatarUrl" [src]="form.avatarUrl" class="avatar-img" alt="Avatar">
              <div class="avatar-placeholder" *ngIf="!form.avatarUrl">
                <i class="ri-user-line"></i>
              </div>
              <div class="image-upload-row">
                <input type="file" (change)="onFileChange($event)" accept="image/*">
                <button class="btn-upload" (click)="uploadAvatar()" [disabled]="isUploading || !selectedFile">
                  <i class="ri-loader-4-line spin" *ngIf="isUploading"></i>
                  <i class="ri-upload-cloud-line" *ngIf="!isUploading"></i>
                  {{ isUploading ? 'Đang tải...' : 'Upload' }}
                </button>
              </div>
            </div>
            <div class="card-body" style="padding-top:0">
              <div class="form-group">
                <label>Hoặc nhập URL</label>
                <input type="text" [(ngModel)]="form.avatarUrl" placeholder="https://...">
              </div>
            </div>
          </div>

        </div>

        <!-- Col phải: Trạng thái & lưu -->
        <div class="user-col-right">

          <!-- Card: Trạng thái -->
          <div class="detail-card">
            <h2 class="card-title"><i class="ri-shield-check-line"></i> Trạng thái</h2>

            <div class="toggle-row">
              <div>
                <div class="toggle-label">Cho phép đăng nhập</div>
                <div class="toggle-sub">Tắt = khóa tài khoản</div>
              </div>
              <label class="toggle-switch">
                <input type="checkbox" [(ngModel)]="form.isActive">
                <span class="toggle-slider"></span>
              </label>
            </div>

            <div class="form-actions">
              <button class="admin-action-btn admin-action-btn-delete"
                      *ngIf="userId !== 'new'"
                      (click)="delete()"
                      [disabled]="isDeleting || isSaving">
                <i class="ri-loader-4-line spin" *ngIf="isDeleting"></i>
                <i class="ri-delete-bin-line" *ngIf="!isDeleting"></i>
                {{ isDeleting ? 'Đang xóa...' : 'Xóa' }}
              </button>

              <button class="admin-action-btn admin-action-btn-edit"
                      (click)="save()"
                      [disabled]="isSaving || isDeleting">
                <i class="ri-loader-4-line spin" *ngIf="isSaving"></i>
                <i class="ri-save-line" *ngIf="!isSaving"></i>
                {{ isSaving ? 'Đang lưu...' : 'Lưu' }}
              </button>
            </div>
          </div>

        </div>

      </div>
    </ng-container>

  </main>
</section>

</div>
