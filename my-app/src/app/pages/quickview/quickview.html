<div class="fixed inset-0 bg-black/50 z-[999] flex items-center justify-center">
  <div class="bg-white w-[90%] md:w-[600px] p-6 relative rounded-lg">

    <!-- CLOSE -->
    <button
      class="absolute top-3 right-3 text-xl"
      (click)="close.emit()">✕</button>

    <div class="grid md:grid-cols-2 gap-6">

      <!-- IMAGE + ARROW RIGHT -->
      <div class="relative">
        <img [src]="product.image" class="w-full rounded">

        <button
          class="absolute right-2 top-1/2 -translate-y-1/2 bg-white p-2 shadow rounded-full">
          <i class="ri-arrow-right-s-line"></i>
        </button>
      </div>

      <!-- INFO -->
      <div>
        <h2 class="text-xl font-bold mb-2">{{ product.name }}</h2>

        <!-- PRICE -->
        <div class="flex items-center gap-3 mb-4">
          <span class="text-green-600 text-xl font-bold">
            {{ product.price | currency:'VND' }}
          </span>
          <span class="line-through text-gray-400">
            {{ product.oldPrice | currency:'VND' }}
          </span>
        </div>

        <!-- SIZE (CHỈ CHỌN 1) -->
        <div class="mb-4">
          <p class="font-semibold mb-2">Size</p>
          <div class="flex gap-2">
            <button
              *ngFor="let s of product.sizes"
              (click)="selectSize(s)"
              [class.bg-green-600]="selectedSize === s"
              [class.text-white]="selectedSize === s"
              class="border px-3 py-1 rounded">
              {{ s }}
            </button>
          </div>
        </div>

        <!-- ADD CART -->
        <button
          class="w-full bg-green-600 text-white py-3 rounded"
          (click)="addToCart()">
          Thêm vào giỏ hàng
        </button>
      </div>

    </div>
  </div>
</div>

<!-- Toast Notification -->
<div *ngIf="showNotification" 
     class="toast-slide-in fixed top-24 right-5 z-[9999] min-w-[350px] max-w-md transition-all duration-300">
    
    <div [class]="'relative flex items-start p-4 rounded shadow-lg border-l-4 transition-colors ' + 
                  (notificationType === 'success' ? 'bg-green-50 border-green-600' : 'bg-red-50 border-red-600')">
        
        <div class="flex-shrink-0 mr-3">
            <i [class]="'text-2xl ' + (notificationType === 'success' ? 'ri-checkbox-circle-fill text-green-600' : 'ri-close-circle-fill text-red-600')"></i>
        </div>

        <div class="flex-1 pt-1">
            <h3 [class]="'font-bold text-sm ' + (notificationType === 'success' ? 'text-green-800' : 'text-red-800')">
                {{ notificationType === 'success' ? 'Thành công' : 'Lỗi' }}
            </h3>
            <p class="mt-1 text-sm text-gray-700 leading-tight">
                {{ notificationMessage }}
            </p>
        </div>

        <button (click)="closeToast()" class="ml-4 flex-shrink-0 text-gray-400 hover:text-gray-600 transition-colors">
            <i class="ri-close-line text-xl"></i>
        </button>
    </div>
</div>
