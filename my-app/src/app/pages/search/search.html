<div class="relative">
  <input
    type="text"
    placeholder="Tìm sản phẩm..."
    [(ngModel)]="keyword"
    (ngModelChange)="onSearch()"
    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
  />

  <div 
    class="search-result absolute left-0 right-0 top-full mt-1 bg-white shadow-xl rounded-lg max-h-96 overflow-y-auto z-[100] border border-gray-200"
    *ngIf="results.length > 0">
    <div *ngFor="let p of results" 
         (click)="onSelectProduct(p.id)"
         class="flex items-center gap-4 p-3 hover:bg-gray-50 cursor-pointer transition">
      <img [src]="p.image" alt="{{p.name}}" class="w-12 h-12 object-cover rounded">
      <div class="flex-1 min-w-0">
        <div class="font-medium text-gray-800 truncate">{{ p.name }}</div>
        <div class="text-sm text-green-600">{{ p.price | currency:'VND':'symbol':'1.0-0' }}</div>
      </div>
    </div>
  </div>
</div>
