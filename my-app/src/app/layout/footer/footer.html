<!-- ========== SCROLL TO TOP ========== -->
<button
  (click)="scrollTop()"
  *ngIf="showScrollTop"
  [ngStyle]="{
    position: 'fixed',
    bottom: '20px',
    right: '20px',
    width: '50px',
    height: '50px',
    borderRadius: '50%',
    backgroundColor: 'rgba(255, 255, 255, 0.6)', 
    color: '#16a34a',
    display: 'flex',
    alignItems: 'center',
    justifyContent: 'center',
    boxShadow: '0 4px 6px rgba(0,0,0,0.2)',
    cursor: 'pointer',
    opacity: showScrollTop ? 1 : 0,
    transition: 'opacity 0.4s ease-in-out',
    zIndex: 999,
    left: '50%',
    transform: 'translateX(-50%)'
  }"
>
  <i class="ri-arrow-up-line" style="font-size: 22px;"></i>
</button>
