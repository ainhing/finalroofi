<!-- AUTH SECTION - ĐẶT LẠI MẬT KHẨU -->
    <section class="py-20 bg-gray-50 min-h-screen flex items-center justify-center">
        <div class="max-w-7xl mx-auto">
            <div class="max-w-sm mx-auto">
                <div class="bg-white p-8 rounded-lg shadow-lg">
                    <div class="text-center mb-6">
                        <img src="assets/images/Banner_Logo/LogoRoofi.png" alt="ROOFI" class="w-16 mx-auto">
                    </div>
                    
                    <h1 class="text-2xl font-bold text-center mb-2">Đặt lại mật khẩu</h1>
                    <p class="text-gray-600 text-center mb-8">Tạo mật khẩu mới cho tài khoản của bạn!</p>
                    
                    <form class="space-y-6" (ngSubmit)="onResetPasswordSubmit($event)" novalidate>
                        <!-- New Password -->
                        <div class="space-y-2">
                            <label for="new-password" class="block text-sm font-medium">Mật khẩu mới</label>
                            <div class="relative">
                                <i class="ri-lock-line absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                                <input 
                                    type="password" 
                                    id="new-password" 
                                    name="new-password" 
                                    placeholder="Tối thiểu 6 ký tự" 
                                    required 
                                    [(ngModel)]="newPassword"
                                    (input)="onPasswordInput()"
                                    class="w-full pl-10 pr-10 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-green-500">
                                <i 
                                    class="toggle-password absolute right-3 top-1/2 transform -translate-y-1/2 cursor-pointer text-gray-400"
                                    [class.ri-eye-line]="!showNewPassword"
                                    [class.ri-eye-off-line]="showNewPassword"
                                    (click)="togglePassword('new-password')">
                                </i>
                            </div>
                            <!-- Password Strength Indicator -->
                            <div class="mt-2">
                                <div class="h-2 bg-gray-200 rounded">
                                    <div 
                                        class="h-full transition-all"
                                        [ngClass]="{
                                            'bg-red-500': passwordStrength === 'weak',
                                            'bg-orange-500': passwordStrength === 'medium',
                                            'bg-green-500': passwordStrength === 'strong'
                                        }"
                                        [style.width.%]="passwordStrength === 'weak' ? 33 : passwordStrength === 'medium' ? 66 : 100">
                                    </div>
                                </div>
                                <p class="text-sm mt-1" [style.color]="strengthColor">{{ strengthText }}</p>
                            </div>
                        </div>
                        
                        <!-- Confirm New Password -->
                        <div class="space-y-2">
                            <label for="confirm-new-password" class="block text-sm font-medium">Xác nhận mật khẩu mới</label>
                            <div class="relative">
                                <i class="ri-lock-line absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                                <input 
                                    type="password" 
                                    id="confirm-new-password" 
                                    name="confirm-new-password" 
                                    placeholder="Nhập lại mật khẩu" 
                                    required 
                                    [(ngModel)]="confirmNewPassword"
                                    class="w-full pl-10 pr-10 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-green-500">
                                <i 
                                    class="toggle-password absolute right-3 top-1/2 transform -translate-y-1/2 cursor-pointer text-gray-400"
                                    [class.ri-eye-line]="!showConfirmPassword"
                                    [class.ri-eye-off-line]="showConfirmPassword"
                                    (click)="togglePassword('confirm-new-password')">
                                </i>
                            </div>
                        </div>
                        
                        <!-- Password Requirements -->
                        <div class="mt-4">
                            <p class="font-medium">Mật khẩu phải có:</p>
                            <ul class="space-y-1 mt-2">
                                <li 
                                    class="flex items-center text-sm"
                                    [ngClass]="{'text-green-600': reqLength, 'text-gray-600': !reqLength}">
                                    <i 
                                        [class]="reqLength ? 'ri-checkbox-circle-line' : 'ri-close-circle-line'"
                                        class="mr-2">
                                    </i> 
                                    Ít nhất 6 ký tự
                                </li>
                                <li 
                                    class="flex items-center text-sm"
                                    [ngClass]="{'text-green-600': reqUppercase, 'text-gray-600': !reqUppercase}">
                                    <i 
                                        [class]="reqUppercase ? 'ri-checkbox-circle-line' : 'ri-close-circle-line'"
                                        class="mr-2">
                                    </i> 
                                    1 chữ hoa
                                </li>
                                <li 
                                    class="flex items-center text-sm"
                                    [ngClass]="{'text-green-600': reqLowercase, 'text-gray-600': !reqLowercase}">
                                    <i 
                                        [class]="reqLowercase ? 'ri-checkbox-circle-line' : 'ri-close-circle-line'"
                                        class="mr-2">
                                    </i> 
                                    1 chữ thường
                                </li>
                                <li 
                                    class="flex items-center text-sm"
                                    [ngClass]="{'text-green-600': reqNumber, 'text-gray-600': !reqNumber}">
                                    <i 
                                        [class]="reqNumber ? 'ri-checkbox-circle-line' : 'ri-close-circle-line'"
                                        class="mr-2">
                                    </i> 
                                    1 số
                                </li>
                            </ul>
                        </div>
                        
                        <button 
                            type="submit" 
                            [disabled]="isSubmitting"
                            class="w-full px-6 py-3 bg-green-700 text-white rounded font-semibold hover:bg-amber-700 hover:-translate-y-0.5 hover:shadow-lg transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed">
                            <span *ngIf="!isSubmitting">Đặt lại mật khẩu</span>
                            <span *ngIf="isSubmitting">
                                <i class="ri-loader-4-line animate-spin"></i> Đang xử lý...
                            </span>
                        </button>
                    </form>
                    
                    <p class="text-center mt-6">
                        <a routerLink="/login" class="text-green-600 hover:text-green-800 flex items-center justify-center">
                            <i class="ri-arrow-left-line mr-2"></i> Quay lại đăng nhập
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </section>
