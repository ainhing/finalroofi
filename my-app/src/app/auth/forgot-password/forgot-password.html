<section class="py-20 bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="max-w-7xl mx-auto">
    <div class="max-w-sm mx-auto">
      <div class="bg-white p-8 rounded-lg shadow-lg">

        <div class="text-center mb-6">
          <img src="assets/images/Banner_Logo/LogoRoofi.png" alt="ROOFI" class="w-16 mx-auto">
        </div>

        <h1 class="text-2xl font-bold text-center mb-2">Quên mật khẩu?</h1>
        <p class="text-gray-600 text-center mb-8">
          Nhập email để nhận mã xác nhận đặt lại mật khẩu!
        </p>

        <!-- BƯỚC 1: NHẬP EMAIL -->
        <form 
          class="space-y-6" 
          [style.display]="!showOTPForm ? 'block' : 'none'"
          (ngSubmit)="onForgotPasswordSubmit($event)" 
          novalidate>
          <div class="space-y-2">
            <label class="block text-sm font-medium">Email đã đăng ký</label>
            <div class="relative">
              <i class="ri-mail-line absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
              <input 
                type="email" 
                placeholder="example@email.com" 
                [(ngModel)]="email"
                name="email"
                required
                class="w-full pl-10 pr-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>
          </div>

          <button 
            type="submit" 
            [disabled]="isSubmitting"
            class="w-full px-6 py-3 bg-green-700 text-white rounded font-semibold hover:bg-amber-700 hover:-translate-y-0.5 hover:shadow-lg transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed">
            <span *ngIf="!isSubmitting">Gửi mã xác nhận</span>
            <span *ngIf="isSubmitting">
              <i class="ri-loader-4-line animate-spin"></i> Đang gửi...
            </span>
          </button>
        </form>

        <!-- BƯỚC 2: NHẬP OTP -->
        <form 
          class="space-y-6" 
          [style.display]="showOTPForm ? 'block' : 'none'"
          (ngSubmit)="onVerifyCodeSubmit($event)" 
          novalidate>
          <div class="space-y-2">
            <label class="block text-sm font-medium">Mã xác nhận (6 số)</label>

            <div 
              #otpContainer
              class="flex gap-2 justify-center">
              <input 
                type="text" 
                maxlength="1" 
                [(ngModel)]="otp[0]"
                name="otp-0"
                (input)="onOTPInput($event, 0)"
                (keydown)="onOTPKeyDown($event, 0)"
                class="otp-input w-12 h-12 text-center border rounded focus:outline-none focus:ring-2 focus:ring-green-500">
              <input 
                type="text" 
                maxlength="1" 
                [(ngModel)]="otp[1]"
                name="otp-1"
                (input)="onOTPInput($event, 1)"
                (keydown)="onOTPKeyDown($event, 1)"
                class="otp-input w-12 h-12 text-center border rounded focus:outline-none focus:ring-2 focus:ring-green-500">
              <input 
                type="text" 
                maxlength="1" 
                [(ngModel)]="otp[2]"
                name="otp-2"
                (input)="onOTPInput($event, 2)"
                (keydown)="onOTPKeyDown($event, 2)"
                class="otp-input w-12 h-12 text-center border rounded focus:outline-none focus:ring-2 focus:ring-green-500">
              <input 
                type="text" 
                maxlength="1" 
                [(ngModel)]="otp[3]"
                name="otp-3"
                (input)="onOTPInput($event, 3)"
                (keydown)="onOTPKeyDown($event, 3)"
                class="otp-input w-12 h-12 text-center border rounded focus:outline-none focus:ring-2 focus:ring-green-500">
              <input 
                type="text" 
                maxlength="1" 
                [(ngModel)]="otp[4]"
                name="otp-4"
                (input)="onOTPInput($event, 4)"
                (keydown)="onOTPKeyDown($event, 4)"
                class="otp-input w-12 h-12 text-center border rounded focus:outline-none focus:ring-2 focus:ring-green-500">
              <input 
                type="text" 
                maxlength="1" 
                [(ngModel)]="otp[5]"
                name="otp-5"
                (input)="onOTPInput($event, 5)"
                (keydown)="onOTPKeyDown($event, 5)"
                class="otp-input w-12 h-12 text-center border rounded focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>

            <p class="text-sm text-gray-600 text-center">
              Mã đã được gửi đến email của bạn!
            </p>
          </div>

          <button 
            type="submit" 
            [disabled]="isVerifying"
            class="w-full px-6 py-3 bg-green-700 text-white rounded font-semibold hover:bg-amber-700 hover:-translate-y-0.5 hover:shadow-lg transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed">
            <span *ngIf="!isVerifying">Xác nhận</span>
            <span *ngIf="isVerifying">
              <i class="ri-loader-4-line animate-spin"></i> Đang xác nhận...
            </span>
          </button>

          <p class="text-sm text-center">
            Không nhận được mã?
            <button 
              type="button" 
              (click)="onResendCode($event)"
              class="text-green-600 hover:text-green-800 underline">
              Gửi lại
            </button>
          </p>
        </form>

        <p class="text-center mt-6">
          <a routerLink="/login" class="text-green-600 hover:text-green-800 flex items-center justify-center">
            <i class="ri-arrow-left-line mr-2"></i> Quay lại đăng nhập
          </a>
        </p>
      </div>
    </div>
  </div>
</section>
