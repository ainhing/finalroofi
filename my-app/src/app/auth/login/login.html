<!-- AUTH SECTION - ĐĂNG NHẬP -->
    <section class="py-20 bg-gray-50 min-h-screen flex items-center justify-center">
        <div class="max-w-7xl mx-auto">
            <div class="max-w-md mx-auto">
                <div class="bg-white p-8 rounded-lg shadow-lg">
                    <!-- Logo -->
                    <div class="text-center mb-6">
                        <img src="assets/images/Banner_Logo/LogoRoofi.png" alt="ROOFI" class="w-16 mx-auto">
                    </div>
                    
                    <!-- Heading -->
                    <h1 class="text-2xl font-bold text-center mb-2">Đăng nhập</h1>
                    <p class="text-gray-600 text-center mb-8">Chào mừng bạn trở lại ROOFI! 🌿</p>
                    
                    <!-- Form -->
                    <form class="space-y-6" (ngSubmit)="onLoginSubmit($event)" novalidate>
                        <!-- Email -->
                        <div class="space-y-2">
                            <label for="email" class="block text-sm font-medium">Email</label>
                            <div class="relative">
                                <i class="ri-mail-line absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                                <input 
                                    type="email" 
                                    id="email" 
                                    name="email" 
                                    placeholder="example@email.com" 
                                    required 
                                    [(ngModel)]="email"
                                    class="w-full pl-10 pr-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-green-500">
                            </div>
                        </div>
                        
                        <!-- Password -->
                        <div class="space-y-2">
                            <label for="password" class="block text-sm font-medium">Mật khẩu</label>
                            <div class="relative">
                                <input 
                                    type="password" 
                                    id="password" 
                                    name="password" 
                                    placeholder="Nhập mật khẩu" 
                                    required 
                                    [(ngModel)]="password"
                                    class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-green-500">
                            </div>
                        </div>
                        
                        <!-- Remember & Forgot -->
                        <div class="flex justify-between items-center gap-4">
                            <label class="flex items-center space-x-2">
                                <input type="checkbox" name="remember" [(ngModel)]="remember">
                                <span>Ghi nhớ đăng nhập</span>
                            </label>
                            <a routerLink="/forgot-password" class="text-green-600 hover:text-green-800 whitespace-nowrap">Quên mật khẩu?</a>
                        </div>
                        
                        <!-- Submit Button -->
                        <button 
                            type="submit" 
                            [disabled]="isSubmitting"
                            class="w-full px-6 py-3 bg-green-700 text-white rounded font-semibold hover:bg-amber-700 hover:-translate-y-0.5 hover:shadow-lg transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed">
                            <span *ngIf="!isSubmitting">Đăng nhập</span>
                            <span *ngIf="isSubmitting">
                                <i class="ri-loader-4-line animate-spin"></i> Đang xử lý...
                            </span>
                        </button>
                    </form>
                    
                    <!-- Divider -->
                    <div class="flex items-center my-6">
                        <hr class="flex-1">
                        <span class="px-4 text-gray-500">HOẶC</span>
                        <hr class="flex-1">
                    </div>
                    
                    <!-- Social Login -->
                    <div class="space-y-3">
                        <!-- Google Login Button -->
                        <button 
                            type="button"
                            (click)="onGoogleLogin()"
                            [disabled]="isSubmitting"
                            class="w-full flex items-center justify-center px-4 py-3 border border-gray-300 rounded-lg hover:bg-gray-50 hover:border-gray-400 transition font-medium text-gray-700 disabled:opacity-50 disabled:cursor-not-allowed">
                            <svg class="w-5 h-5 mr-2" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                            </svg>
                            Đăng nhập với Google
                        </button>

                        <!-- Divider -->
                        <div class="relative my-4">
                            <div class="absolute inset-0 flex items-center">
                                <div class="w-full border-t border-gray-300"></div>
                            </div>
                            <div class="relative flex justify-center text-sm">
                                <span class="px-2 bg-white text-gray-500">Hoặc sử dụng email</span>
                            </div>
                        </div>

                        <!-- Facebook Login Button -->
                        <button 
                            type="button"
                            (click)="onEmailLogin()"
                            [disabled]="isSubmitting"
                            class="w-full flex items-center justify-center px-4 py-3 border border-gray-300 rounded-lg hover:bg-gray-50 hover:border-gray-400 transition font-medium text-gray-700 disabled:opacity-50 disabled:cursor-not-allowed">
                            <i class="ri-facebook-fill text-xl mr-2 text-blue-600"></i>
                            Đăng nhập bằng Facebook
                        </button>
                    </div>
                    
                    <!-- Sign Up Link -->
                    <p class="text-center mt-6">
                        Chưa có tài khoản? <a routerLink="/signup" class="text-green-600 hover:text-green-800 font-medium">Đăng ký ngay</a>
                    </p>
                </div>
            </div>
        </div>
    </section>
